name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Set up Task
      uses: go-task/setup-task@v1

    - name: Generate cipher files
      run: |
        if [ -n "$CF_API_KEY" ]; then
          task cipher-generate
        else
          echo "CF_API_KEY not set, skipping cipher generation"
        fi
      env:
        CF_API_KEY: ${{ secrets.CF_API_KEY }}

    - name: Build release binaries
      run: task build:release
      env:
        CF_API_KEY: ${{ secrets.CF_API_KEY }}

    - name: Compress binaries
      run: |
        gzip release/lucy-linux-amd64
        gzip release/lucy-windows-amd64.exe
        gzip release/lucy-darwin-amd64
        gzip release/lucy-darwin-arm64

    - name: Upload linux-amd64
      uses: actions/upload-artifact@v4
      with:
        name: lucy-linux-amd64
        path: release/lucy-linux-amd64.gz

    - name: Upload windows-amd64
      uses: actions/upload-artifact@v4
      with:
        name: lucy-windows-amd64
        path: release/lucy-windows-amd64.exe.gz

    - name: Upload darwin-amd64
      uses: actions/upload-artifact@v4
      with:
        name: lucy-darwin-amd64
        path: release/lucy-darwin-amd64.gz

    - name: Upload darwin-arm64
      uses: actions/upload-artifact@v4
      with:
        name: lucy-darwin-arm64
        path: release/lucy-darwin-arm64.gz

# https://taskfile.dev

version: "3"
interval: 700ms

dotenv:
  - ".env"
  - ".cipher_key"
  - ".cipher_ciphertext"

vars:
  CIPHER_KEY:
    sh: cut -d= -f2 .cipher_key
  CIPHER_TEXT:
    sh: cut -d= -f2 .cipher_ciphertext
  CF_CIPHER_LDFLAGS: >-
    -X github.com/mclucy/lucy/internal/cipher.Key={{.CIPHER_KEY}}
    -X github.com/mclucy/lucy/internal/cipher.Ciphertext={{.CIPHER_TEXT}}
  RELEASE_LDFLAGS: "-w -s {{.CF_CIPHER_LDFLAGS}}"
  DEBUG_LDFLAGS: "{{.CF_CIPHER_LDFLAGS}}"
  DEV_BINARY: dist/lucy-darwin-arm64-dev

tasks:
  copyright-add:
    desc: Add missing copyright headers to Go files
    cmds:
      - ./copyright.sh add

  copyright-remove:
    desc: Remove copyright headers from Go files
    cmds:
      - ./copyright.sh remove

  clean:
    desc: Remove all generated build artifacts
    deps:
      - clean:dist
      - clean:release
      - clean:completions

  clean:dist:
    desc: Remove development build artifacts
    cmds:
      - rm -rf dist

  clean:release:
    desc: Remove release build artifacts
    cmds:
      - rm -rf release

  clean:completions:
    desc: Remove generated shell completion scripts
    cmds:
      - rm -rf completions

  cipher-generate:
    desc: Generate new cipher key and ciphertext from CF_API_KEY
    cmds:
      - |
        if [ -z "$CF_API_KEY" ]; then
          echo "[ERROR] CF_API_KEY not set"
          exit 1
        fi
        KEY=$(go run ./tools/cipher -keygen | cut -d= -f2)
        CIPHERTEXT=$(go run -ldflags "-X github.com/mclucy/lucy/internal/cipher.Key=$KEY" ./tools/cipher -encrypt "$CF_API_KEY" | cut -d= -f2)
        echo "cipher_key=$KEY" > .cipher_key
        echo "cipher_ciphertext=$CIPHERTEXT" > .cipher_ciphertext
        cat .cipher_key
        cat .cipher_ciphertext
    generates:
      - .cipher_key
      - .cipher_ciphertext

  check:cf-api-key-length:
    desc: Warn when CF_API_KEY length is unexpected
    cmds:
      - '[ "${#CF_API_KEY}" -eq 60 ] || printf "[WARN] CF_API_KEY length is %s (expected 60)\n" "${#CF_API_KEY}"'

  warn-cf-api-key-length:
    internal: true
    deps:
      - check:cf-api-key-length

  build:release:
    desc: Build release binaries for Windows, Linux, and macOS
    deps:
      - clean:release
      - check:cf-api-key-length
    cmds:
      - |
        GOOS=linux GOARCH=amd64 go build -ldflags='{{.RELEASE_LDFLAGS}}' -tags release -o release/lucy-linux-amd64
        GOOS=windows GOARCH=amd64 go build -ldflags='{{.RELEASE_LDFLAGS}}' -tags release -o release/lucy-windows-amd64.exe
        GOOS=darwin GOARCH=amd64 go build -ldflags='{{.RELEASE_LDFLAGS}}' -tags release -o release/lucy-darwin-amd64
        GOOS=darwin GOARCH=arm64 go build -ldflags='{{.RELEASE_LDFLAGS}}' -tags release -o release/lucy-darwin-arm64
    sources:
      - "./**/*.go"
      - "./go.mod"
      - "./go.sum"

  build:dev-core:
    desc: Build the local macOS ARM64 development binary
    deps:
      - check:cf-api-key-length
    cmds:
      - GOOS=darwin GOARCH=arm64 go build -ldflags='{{.DEBUG_LDFLAGS}}' -tags debug -o {{.DEV_BINARY}}
    sources:
      - "./**/*.go"
      - "./go.mod"
      - "./go.sum"
    generates:
      - "{{.DEV_BINARY}}"

  build:dev:
    desc: Clean and build the local macOS ARM64 development binary
    deps:
      - clean:dist
      - build:dev-core

  build:watch:
    desc: Rebuild the local debug binary on Go file changes
    cmds:
      - task build:dev-core
    watch: true
    sources:
      - "./**/*.go"
      - "./go.mod"
      - "./go.sum"
    method: timestamp

  build:
    desc: Build the local development binary
    deps:
      - build:dev

  dev:
    desc: Build the default local development binary
    deps:
      - build:dev

  test:
    desc: Run the Go test suite
    cmds:
      - go test ./...

  test:race:
    desc: Run the Go test suite with the race detector
    cmds:
      - go test -race ./...

  check:
    desc: Run the default local verification tasks
    deps:
      - test
      - test:race

  generate:completions:
    desc: Generate bash, zsh, and fish completion scripts
    deps:
      - clean:completions
    cmds:
      - mkdir -p completions
      - go run main.go completion bash > completions/lucy.sh
      - go run main.go completion zsh > completions/lucy.zsh
      - go run main.go completion fish > completions/lucy.fish
    sources:
      - ./main.go
      - ./go.mod
      - ./go.sum
    generates:
      - completions/lucy.sh
      - completions/lucy.zsh
      - completions/lucy.fish

  gen-completions:
    internal: true
    deps:
      - generate:completions

  build-release:
    internal: true
    deps:
      - build:release

  build-dev:
    internal: true
    deps:
      - build:dev

  build-dev-incremental:
    internal: true
    deps:
      - build:dev-core

  build-watch:
    internal: true
    deps:
      - build:watch

  cleanup-dist:
    internal: true
    deps:
      - clean:dist

  cleanup-release:
    internal: true
    deps:
      - clean:release

  cleanup-completions:
    internal: true
    deps:
      - clean:completions

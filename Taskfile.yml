# https://taskfile.dev

version: "3"
interval: 700ms

dotenv:
  - ".env"
  - ".cipher_key"
  - ".cipher_ciphertext"

vars:
  CF_CIPHER_LDFLAGS: >-
    -X github.com/mclucy/lucy/internal/cipher.Key=$(shell cut -d= -f2 .cipher_key)
    -X github.com/mclucy/lucy/internal/cipher.Ciphertext=$(shell cut -d= -f2 .cipher_ciphertext)
  RELEASE_LDFLAGS: "-w -s {{.CF_CIPHER_LDFLAGS}}"
  DEBUG_LDFLAGS: "{{.CF_CIPHER_LDFLAGS}}"

tasks:
  copyright-add:
    desc: Add missing copyright headers to Go files
    cmds:
      - ./copyright.sh add

  copyright-remove:
    desc: Remove copyright headers from Go files
    cmds:
      - ./copyright.sh remove

  cleanup-dist:
    desc: Remove development build artifacts
    cmds:
      - rm -rf dist

  cleanup-release:
    desc: Remove release build artifacts
    cmds:
      - rm -rf release

  cleanup-completions:
    desc: Remove generated shell completion scripts
    cmds:
      - rm -rf completions

  warn-cf-api-key-length:
    desc: Warn when CF_API_KEY length is unexpected
    cmds:
      - '[ "${#CF_API_KEY}" -eq 60 ] || printf "[WARN] CF_API_KEY length is %s (expected 60)\n" "${#CF_API_KEY}"'

  cipher-generate:
    desc: Generate new cipher key and ciphertext from CF_API_KEY
    cmds:
      - |
        if [ -z "$CF_API_KEY" ]; then
          echo "[ERROR] CF_API_KEY not set"
          exit 1
        fi
        KEY=$(go run ./tools/cipher -keygen | cut -d= -f2)
        CIPHERTEXT=$(go run -ldflags "-X github.com/mclucy/lucy/internal/cipher.Key=$KEY" ./tools/cipher -encrypt "$CF_API_KEY" | cut -d= -f2)
        echo "cipher_key=$KEY" > .cipher_key
        echo "cipher_ciphertext=$CIPHERTEXT" > .cipher_ciphertext
        cat .cipher_key
        cat .cipher_ciphertext
    generates:
      - .cipher_key
      - .cipher_ciphertext

  build-release:
    desc: Build release binaries for Windows, Linux, and macOS
    deps:
      - cleanup-release
      - warn-cf-api-key-length
    cmds:
      - |
        KEY=$(cut -d= -f2 .cipher_key)
        CIPHER=$(cut -d= -f2 .cipher_ciphertext)
        LDFLAGS="-w -s -X github.com/mclucy/lucy/internal/cipher.Key=$KEY -X github.com/mclucy/lucy/internal/cipher.Ciphertext=$CIPHER"
        GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -tags release -o release/lucy-linux-amd64
        GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -tags release -o release/lucy-windows-amd64.exe
        GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -tags release -o release/lucy-darwin-amd64
        GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -tags release -o release/lucy-darwin-arm64
    sources:
      - "./**/*.go"
      - "./go.mod"
      - "./go.sum"

  build-dev:
    desc: Build a development binary for macOS
    deps:
      - cleanup-dist
      - warn-cf-api-key-length
    cmds:
      - |
        KEY=$(cut -d= -f2 .cipher_key)
        CIPHER=$(cut -d= -f2 .cipher_ciphertext)
        GOOS=darwin GOARCH=arm64 go build -ldflags="-X github.com/mclucy/lucy/internal/cipher.Key=$KEY -X github.com/mclucy/lucy/internal/cipher.Ciphertext=$CIPHER" -tags debug -o dist/lucy-darwin-arm64-dev
    sources:
      - "./**/*.go"
      - "./go.mod"
      - "./go.sum"
    generates:
      - dist/lucy-darwin-arm64-dev

  build-dev-incremental:
    desc: Build the development binary without cleaning dist
    deps:
      - warn-cf-api-key-length
    cmds:
      - |
        KEY=$(cut -d= -f2 .cipher_key)
        CIPHER=$(cut -d= -f2 .cipher_ciphertext)
        GOOS=darwin GOARCH=arm64 go build -ldflags="-X github.com/mclucy/lucy/internal/cipher.Key=$KEY -X github.com/mclucy/lucy/internal/cipher.Ciphertext=$CIPHER" -tags debug -o dist/lucy-darwin-arm64-dev
    sources:
      - "./**/*.go"
      - "./go.mod"
      - "./go.sum"
    generates:
      - dist/lucy-darwin-arm64-dev
    method: timestamp

  build-watch:
    desc: Rebuild the debug binary on Go file changes
    cmds:
      - task build-dev-incremental
    watch: true
    sources:
      - "./**/*.go"
      - "./go.mod"
      - "./go.sum"
    method: timestamp

  gen-completions:
    desc: Generate bash, zsh, and fish completion scripts
    deps:
      - cleanup-completions
    cmds:
      - mkdir -p completions
      - go run main.go completion bash > completions/lucy.sh
      - go run main.go completion zsh > completions/lucy.zsh
      - go run main.go completion fish > completions/lucy.fish
    sources:
      - ./main.go
      - ./go.mod
      - ./go.sum
    generates:
      - completions/lucy.sh
      - completions/lucy.zsh
      - completions/lucy.fish

# https://taskfile.dev

version: "3"

tasks:
  copyright-add:
    desc: Add missing copyright headers to Go files
    cmds:
      - ./copyright.sh add
  copyright-remove:
    desc: Remove copyright headers from Go files
    cmds:
      - ./copyright.sh remove
  cleanup-dist:
    cmds:
      - rm -rf dist
  cleanup-release:
    cmds:
      - rm -rf release
  cleanup-completions:
    cmds:
      - rm -rf completions
  build-release:
    desc: Build the release for Windows, Linux, and macOS
    deps: [cleanup-release, inject-env]
    cmds:
      - GOOS=linux GOARCH=amd64 go build -ldflags="-w -s -X github.com/mclucy/lucy/upstream/curseforge.ApiKey=$(CF_API_KEY)" -tags release -o release/lucy-linux-amd64
      - GOOS=windows GOARCH=amd64 go build -ldflags="-w -s -X github.com/mclucy/lucy/upstream/curseforge.ApiKey=$(CF_API_KEY)" -tags release -o release/lucy-windows-amd64.exe
      - GOOS=darwin GOARCH=amd64 go build -ldflags="-w -s -X github.com/mclucy/lucy/upstream/curseforge.ApiKey=$(CF_API_KEY)" -tags release -o release/lucy-darwin-amd64
      - GOOS=darwin GOARCH=arm64 go build -ldflags="-w -s -X github.com/mclucy/lucy/upstream/curseforge.ApiKey=$(CF_API_KEY)" -tags release -o release/lucy-darwin-arm64
    sources: [./**/*.go, go.mod, .go.sum]
  build-dev:
    desc: Build a binary for development purposes (on macOS)
    deps: [cleanup-dist, inject-env]
    cmds:
      - GOOS=darwin GOARCH=arm64 go build -ldflags="-X github.com/mclucy/lucy/upstream/curseforge.ApiKey=$(CF_API_KEY)" -tags debug -o dist/lucy-darwin-arm64-dev
    sources: [./**/*.go, ./go.mod, ./go.sum]
    generates: [dist/lucy-darwin-arm64-dev]
    vars:
      INTERVAL: 1s
      DELAY: 500ms
  build-watch:
    desc: Build a debug binary on file changes
    deps: [build-dev, inject-env]
    cmds:
      - task build-dev
    watch: true
    sources: ["./**/*.go", "./go.mod", "./go.sum"]
  gen-completions:
    desc: Generate auto-completion scripts for bash, zsh, and fish
    deps: [cleanup-completions]
    cmds:
      - mkdir -p completions
      - go run main.go completion bash > completions/lucy.sh
      - go run main.go completion zsh > completions/lucy.zsh
      - go run main.go completion fish > completions/lucy.fish
    sources: [./main.go, ./go.mod, ./go.sum]
    generates:
      [completions/lucy.sh, completions/lucy.zsh, completions/lucy.fish]
  inject-env:
    desc: Inject environment variables
    cmds:
      - source .env
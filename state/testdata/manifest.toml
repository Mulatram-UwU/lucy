[format]
version = "v1"

[environment]
game_version = "1.21.1"
platform = "neoforge"
platform_version = "21.1.0"
compatible_platforms = ["fabric", "mcdr", "sinytra"]

[sources]
[[sources.custom]]
name = "mirror"
url = "https://example.com/modrinth/index.json"
type = "modrinth"

[layout]
mods_dir = "mods"
plugins_dir = "plugins"
config_dir = "config"

[policy]
managed_roots = ["mods", "plugins", "config"]
unmanaged_paths = ["world/**", "logs/**"]

[[packages]]
id = "neoforge/connector"
version = "compatible"
source = "modrinth"
role = "required"
side = "both"
optional = false
pinned = false

[[packages]]
id = "neoforge/lithium"
version = "latest"
source = "github"
role = "transitive"
side = "server"
optional = true
pinned = true

[[bundles]]
name = "default-config"
type = "config"
path = "config/defaults"
source = "./defaults/config"
optional = false

[[bundles]]
name = "spawn-datapack"
type = "datapack"
path = "world/datapacks/spawn"
source = "./defaults/datapacks/spawn"
optional = true

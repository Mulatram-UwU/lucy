[meta]
format_version = "v1"

[sources]
priority = ["modrinth", "curseforge", "github", "mcdr"]
preferred = "auto"
allow_custom = true

[upgrade]
mode = "latest"
allow_major_bumps = true

[scope]
managed_roots = ["mods", "plugins", "config"]
unmanaged_paths = ["world/**", "logs/**"]
preserve_on_remove = ["config/**", "plugins/LuckPerms/**"]

[optional]
include_optional = true
client_mods = false

[output]
no_style = false
json = true
